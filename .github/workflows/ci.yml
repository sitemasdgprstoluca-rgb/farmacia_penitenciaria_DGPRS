name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

# Limit permissions for security
permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend
    
    steps:
    # Using v4 tag for convenience; pin to SHA for production-critical workflows
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Django checks
      run: |
        DEBUG=True python manage.py check
    
    - name: Check for migration issues
      run: |
        DEBUG=True python manage.py makemigrations --check --dry-run
    
    - name: Run tests
      run: |
        DEBUG=True python -m pytest --tb=short -q

  frontend-tests:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: inventario-front
    
    steps:
    # Using v4 tag for convenience; pin to SHA for production-critical workflows
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: inventario-front/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linter
      run: npm run lint
    
    - name: Run tests
      run: npm test -- --run
    
    - name: Build
      run: npm run build
