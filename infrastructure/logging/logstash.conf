# Logstash configuration
# NOTA: Ajustar paths según tu entorno real
# Variables de entorno: LOG_DIR (default: /var/log/farmacia)

input {
  # Django logs (REQUERIDO)
  file {
    path => "${LOG_DIR:/var/log/farmacia}/django.log"
    start_position => "beginning"
    tags => ["django"]
    codec => multiline {
      pattern => "^%{TIMESTAMP_ISO8601}"
      negate => true
      what => "previous"
    }
  }

  # Nginx logs (OPCIONAL - descomentar solo si usas Nginx y archivo existe)
  # Si este archivo no existe, Logstash generará warnings en logs (no crítico)
  # file {
  #   path => "/var/log/nginx/error.log"
  #   start_position => "beginning"
  #   tags => ["nginx"]
  # }

  # PostgreSQL logs (OPCIONAL - descomentar solo si logs en archivo)
  # Muchas instalaciones de Postgres loguean a syslog, no a archivo
  # file {
  #   path => "/var/log/postgres/postgresql.log"
  #   start_position => "beginning"
  #   tags => ["postgres"]
  # }
}

filter {
  if "django" in [tags] {
    grok {
      match => { "message" => "%{LOGLEVEL:level} %{TIMESTAMP_ISO8601:timestamp} %{DATA:module} %{INT:process} %{INT:thread} %{GREEDYDATA:msg}" }
    }
  }

  if "nginx" in [tags] {
    grok {
      match => { "message" => "%{NGINXERROR}" }
    }
  }

  date {
    match => [ "timestamp", "ISO8601" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "farmacia-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
