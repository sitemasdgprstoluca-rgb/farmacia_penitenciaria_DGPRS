# Alert rules para Prometheus
# 
# ⚠️ IMPORTANTE: Este archivo requiere los siguientes exporters instalados:
#    - django-prometheus (pip install django-prometheus) → métricas django_*
#    - postgres_exporter (https://github.com/prometheus-community/postgres_exporter) → métricas pg_*
#    - redis_exporter (https://github.com/oliver006/redis_exporter) → métricas redis_*
#    - node_exporter (https://github.com/prometheus/node_exporter) → métricas node_*
#
# Si NO tienes estos exporters instalados:
#   1. Las reglas se cargarán pero nunca se evaluarán (métricas no existen)
#   2. Prometheus mostrará warnings en logs sobre evaluaciones fallidas
#   3. Alertas NUNCA se dispararán
#
# RECOMENDACIÓN:
#   - Comentar este archivo completo en prometheus_config.yml (rule_files) hasta instalar exporters
#   - O instalar exporters según README.md antes de habilitar
#
groups:
  - name: farmacia_alerts
    interval: 30s
    rules:
      # Django/API
      - alert: HighErrorRate
        expr: rate(django_http_errors_total[5m]) > 0.05
        for: 5m
        annotations:
          summary: "High error rate detected"
          description: "Error rate > 5% en los últimos 5 minutos"

      - alert: SlowAPIResponse
        expr: histogram_quantile(0.95, django_http_request_duration_seconds) > 1
        for: 5m
        annotations:
          summary: "API responses slow"
          description: "P95 latencia > 1 segundo"

      - alert: DBConnectionPoolExhausted
        expr: django_db_connection_pool_available < 2
        for: 2m
        annotations:
          summary: "Database connection pool warning"
          description: "Pool disponibles < 2"

      # Database
      - alert: PostgresSlow
        expr: pg_slow_queries > 10
        for: 5m
        annotations:
          summary: "Slow queries en PostgreSQL"
          description: "Más de 10 queries lentas"

      - alert: PostgresConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        annotations:
          summary: "Too many DB connections"
          description: "Conexiones activas > 80"

      # Redis
      - alert: RedisMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        annotations:
          summary: "Redis memory usage high"
          description: "Uso de memoria > 85%"

      - alert: RedisEvictions
        expr: rate(redis_evicted_keys_total[5m]) > 0
        for: 5m
        annotations:
          summary: "Redis evicting keys"
          description: "Keys siendo evictadas"

      # System
      - alert: DiskFull
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.1
        for: 5m
        annotations:
          summary: "Disk space low"
          description: "Espacio disponible < 10%"

      - alert: CPUHigh
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        annotations:
          summary: "CPU usage high"
          description: "CPU > 85%"

      - alert: MemoryHigh
        expr: 1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.85
        for: 5m
        annotations:
          summary: "Memory usage high"
          description: "Memoria > 85%"
